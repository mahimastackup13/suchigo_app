# This file configures the analyzer and linter for the SuchiGo project.
# Updated for Flutter 3.44.2 / Dart 3.12.2
# Docs: https://dart.dev/guides/language/analysis-options

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Treat deprecated member use as a WARNING so withOpacity etc. surface clearly.
    deprecated_member_use: warning
    deprecated_member_use_from_same_package: warning
    # Suppress noisy unused-import during active development.
    unused_import: ignore
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - build/**

linter:
  rules:
    # Dart 3 / Flutter 3 best-practice additions
    avoid_print: true
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_final_locals: true
    unnecessary_late: true
    use_super_parameters: true
    unnecessary_null_checks: true
    require_trailing_commas: true
    # Explicitly disable noisy rules acceptable for this project
    public_member_api_docs: false

# Additional information: https://dart.dev/lints
